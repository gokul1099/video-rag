version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: kubrick
      POSTGRES_USER: kubrick
      POSTGRES_PASSWORD: kubrick_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubrick -d kubrick"]
      interval: 10s
      timeout: 5s
      retries: 5

  kubrick-mcp:
    container_name: kubrick-mcp
    build: 
      context: ./kubrick-mcp
    ports:
      - "9090:9090"
    env_file:
      - ./kubrick-mcp/.env
    environment:
      - HT_HOME=/root/.cache/huggingface
    volumes:
      - shared_media:/app/shared_media
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
        reservations:
          cpus: "1"
          memory: "2G"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  kubrick-api:
    container_name: kubrick-api
    build: 
      context: ./kubrick-api
    ports:
      - "8080:8080"
    environment:
      - DISABLE_NEST_ASYNCIO=True
    env_file:
      - ./kubrick-api/.env
    volumes:
      - shared_media:/app/shared_media
    depends_on:
      postgres:
        condition: service_healthy
      kubrick-mcp:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-network
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/kubrick-api
        awslogs-stream: api-server
    healthcheck:
      test: ["CMD","curl","-f", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  
volumes:
  shared_media:
  hf_cache:
  postgres_data:

networks:
  agent-network:
    driver: bridge
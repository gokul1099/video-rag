services:
  postgres:
    container_name: postgres-db
    image: postgres:16-alpine
    logging:
      driver: "none"
    environment:
      POSTGRES_DB: kubrick
      POSTGRES_USER: kubrick
      POSTGRES_PASSWORD: kubrick_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubrick -d kubrick"]
      interval: 10s
      timeout: 5s
      retries: 5

  kubrick-mcp:
    container_name: kubrick-mcp
    build:
      context: ./kubrick-mcp
    ports:
      - "9090:9090"
    env_file:
      - ./kubrick-mcp/.env
    # command: sleep infinity
    networks:
      - agent-network
    environment:
      - HF_HOME=/home/pixeltable/.cache/huggingface
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
    volumes:
      - ./.vscode:/app/.vscode
      - shared_media:/app/shared_media
      - hf_cache:/home/pixeltable/.cache/huggingface
      - ./kubrick-mcp/src:/app/src

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "4"
          memory: 4G

  kubrick-api:
    container_name: kubrick-api
    build:
      context: ./kubrick-api
    # command: sleep infinity
    ports:
      - "8080:8080"
    environment:
      - DISABLE_NEST_ASYNCIO=True
    env_file:
      - ./kubrick-api/.env
    networks:
      - agent-network
    depends_on:
      - kubrick-mcp
    volumes:
      - shared_media:/app/shared_media
      - ./.vscode:/app/.vscode
      - ./kubrick-api/src:/app/src
  kubrick-ui:
    container_name: kubrick-ui
    build:
      context: ./kubrick-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - kubrick-api
      - kubrick-mcp
    networks:
      - agent-network
    volumes:
      - shared_media:/app/shared_media
      - ./kubrick-ui/app:/app/app
      - ./kubrick-ui/components:/app/components
      - ./kubrick-ui/context:/app/context
      - ./kubrick-ui/lib:/app/lib

networks:
  agent-network:
    name: agent-network

volumes:
  shared_media:
  hf_cache:
  db_data: 

